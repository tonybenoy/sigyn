name: "Sigyn Secrets"
description: "Decrypt and inject secrets from a Sigyn vault into your GitHub Actions workflow"
author: "tonybenoy"
branding:
  icon: "lock"
  color: "purple"

inputs:
  bundle:
    description: "CI bundle from `sigyn ci setup` (contains identity + device key + fingerprint)"
    required: true
  passphrase:
    description: "Identity passphrase"
    required: true
  vault-ssh-key:
    description: "SSH private key for cloning the vault repo"
    required: true
  vault-repo:
    description: "Git URL for vault repository"
    required: true
  vault:
    description: "Vault name"
    required: true
  environment:
    description: "Environment name (e.g. dev, staging, prod)"
    required: true
  export:
    description: "Export mode: env (GITHUB_ENV), dotenv (file), json (file), mask-only (mask values, no export)"
    required: false
    default: "env"
  dotenv-path:
    description: "Output path for dotenv/json export"
    required: false
    default: ".env"
  keys:
    description: "Comma-separated list of specific secret keys to export (default: all)"
    required: false
    default: ""
  mask:
    description: "Mask all secret values in GitHub Actions logs"
    required: false
    default: "true"
  version:
    description: "Sigyn version to install (default: latest)"
    required: false
    default: "latest"

outputs:
  secrets-json:
    description: "Compact JSON of exported secrets (env/json modes only). Warning: accessible to all subsequent steps in the job — use key filtering to limit exposure."
    value: ${{ steps.export.outputs.secrets-json }}
  count:
    description: "Number of secrets exported"
    value: ${{ steps.export.outputs.count }}

runs:
  using: "composite"
  steps:
    - name: Install Sigyn
      shell: bash
      env:
        SIGYN_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        # Use the install script bundled with this action ref (not from main branch)
        # to prevent supply-chain attacks via branch modification
        SCRIPT_DIR="${GITHUB_ACTION_PATH}/.."
        if [ -f "$SCRIPT_DIR/install.sh" ]; then
          sh "$SCRIPT_DIR/install.sh"
        else
          # Fallback: download from the release tag matching the requested version
          curl -fsSL "https://raw.githubusercontent.com/tonybenoy/sigyn/main/install.sh" | sh
        fi
        echo "$HOME/.sigyn/bin" >> "$GITHUB_PATH"

    - name: Setup Identity from Bundle
      id: identity
      shell: bash
      env:
        SIGYN_BUNDLE: ${{ inputs.bundle }}
      run: |
        set -euo pipefail

        SIGYN_HOME="${SIGYN_HOME:-$HOME/.sigyn}"
        mkdir -p "$SIGYN_HOME/identities"

        # Unpack bundle: base64-encoded JSON with fingerprint, identity, device_key
        BUNDLE_JSON=$(echo "$SIGYN_BUNDLE" | base64 -d)
        FINGERPRINT=$(echo "$BUNDLE_JSON" | jq -r '.fingerprint')
        IDENTITY_B64=$(echo "$BUNDLE_JSON" | jq -r '.identity')
        DEVICE_KEY_B64=$(echo "$BUNDLE_JSON" | jq -r '.device_key')

        # Validate fingerprint is a safe hex string (no path traversal)
        if ! echo "$FINGERPRINT" | grep -qE '^[a-f0-9]{16,64}$'; then
          echo "::error::Invalid fingerprint format in CI bundle"
          exit 1
        fi

        # Restore identity file
        echo "$IDENTITY_B64" | base64 -d > "$SIGYN_HOME/identities/${FINGERPRINT}.identity"
        chmod 600 "$SIGYN_HOME/identities/${FINGERPRINT}.identity"

        # Restore device key
        echo "$DEVICE_KEY_B64" | base64 -d > "$SIGYN_HOME/.device_key"
        chmod 400 "$SIGYN_HOME/.device_key"

        echo "fingerprint=$FINGERPRINT" >> "$GITHUB_OUTPUT"
        echo "::debug::Identity restored for fingerprint ${FINGERPRINT:0:16}..."

    - name: Clone Vault
      shell: bash
      env:
        VAULT_REPO: ${{ inputs.vault-repo }}
        VAULT_NAME: ${{ inputs.vault }}
        VAULT_SSH_KEY: ${{ inputs.vault-ssh-key }}
      run: |
        set -euo pipefail

        # Validate vault name (alphanumeric, hyphens, underscores only — no path traversal)
        if ! echo "$VAULT_NAME" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9._-]*$'; then
          echo "::error::Invalid vault name: must be alphanumeric with hyphens/underscores only"
          exit 1
        fi

        SIGYN_HOME="${SIGYN_HOME:-$HOME/.sigyn}"
        VAULT_DIR="$SIGYN_HOME/vaults/$VAULT_NAME"

        # Setup SSH key
        mkdir -p ~/.ssh
        echo "$VAULT_SSH_KEY" > ~/.ssh/sigyn_vault_key
        chmod 600 ~/.ssh/sigyn_vault_key
        export GIT_SSH_COMMAND="ssh -i ~/.ssh/sigyn_vault_key -o StrictHostKeyChecking=yes"

        # Pre-fetch GitHub host keys for verification
        if echo "$VAULT_REPO" | grep -q "github.com"; then
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
        elif echo "$VAULT_REPO" | grep -q "gitlab.com"; then
          ssh-keyscan -t ed25519,rsa gitlab.com >> ~/.ssh/known_hosts 2>/dev/null
        fi

        if [ -d "$VAULT_DIR/.git" ]; then
          git -C "$VAULT_DIR" pull --ff-only
        else
          mkdir -p "$SIGYN_HOME/vaults"
          git clone "$VAULT_REPO" "$VAULT_DIR"
        fi

        # Cleanup SSH key
        rm -f ~/.ssh/sigyn_vault_key

    - name: Export Secrets
      id: export
      shell: bash
      env:
        SIGYN_PASSPHRASE: ${{ inputs.passphrase }}
        SIGYN_VAULT: ${{ inputs.vault }}
        SIGYN_ENV: ${{ inputs.environment }}
        SIGYN_EXPORT_MODE: ${{ inputs.export }}
        SIGYN_DOTENV_PATH: ${{ inputs.dotenv-path }}
        SIGYN_KEYS: ${{ inputs.keys }}
        SIGYN_MASK: ${{ inputs.mask }}
        SIGYN_IDENTITY: ${{ steps.identity.outputs.fingerprint }}
      run: |
        set -euo pipefail

        # Validate dotenv-path is relative (prevent writing to arbitrary paths)
        case "$SIGYN_DOTENV_PATH" in
          /*) echo "::error::dotenv-path must be a relative path, got: $SIGYN_DOTENV_PATH"; exit 1 ;;
          *../*) echo "::error::dotenv-path must not contain '..': $SIGYN_DOTENV_PATH"; exit 1 ;;
        esac

        # Export secrets as JSON (stderr suppressed to prevent leaking values before masking)
        RAW_JSON=$("$HOME/.sigyn/bin/sigyn" run export \
          --vault "$SIGYN_VAULT" \
          --env "$SIGYN_ENV" \
          --identity "$SIGYN_IDENTITY" \
          --format json 2>/dev/null)

        # Filter to specific keys if requested
        if [ -n "$SIGYN_KEYS" ]; then
          FILTER=$(echo "$SIGYN_KEYS" | tr ',' '\n' | jq -R . | jq -s '.')
          RAW_JSON=$(echo "$RAW_JSON" | jq --argjson keys "$FILTER" \
            'to_entries | map(select(.key as $k | $keys | index($k))) | from_entries')
        fi

        # Count secrets
        COUNT=$(echo "$RAW_JSON" | jq 'length')
        echo "count=$COUNT" >> "$GITHUB_OUTPUT"

        # Mask all secret values in logs BEFORE any output
        if [ "$SIGYN_MASK" = "true" ]; then
          echo "$RAW_JSON" | jq -r 'to_entries[].value' | while IFS= read -r val; do
            if [ -n "$val" ]; then
              echo "::add-mask::$val"
            fi
          done
        fi

        # Compact JSON for GITHUB_OUTPUT (must be single-line)
        COMPACT_JSON=$(echo "$RAW_JSON" | jq -c '.')

        case "$SIGYN_EXPORT_MODE" in
          env)
            echo "$RAW_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"
            echo "secrets-json=$COMPACT_JSON" >> "$GITHUB_OUTPUT"
            echo "::notice::Exported $COUNT secrets to environment variables"
            ;;
          dotenv)
            echo "$RAW_JSON" | jq -r 'to_entries[] | "\(.key)=\(.value)"' > "$SIGYN_DOTENV_PATH"
            echo "::notice::Exported $COUNT secrets to $SIGYN_DOTENV_PATH"
            ;;
          json)
            echo "$RAW_JSON" > "$SIGYN_DOTENV_PATH"
            echo "secrets-json=$COMPACT_JSON" >> "$GITHUB_OUTPUT"
            echo "::notice::Exported $COUNT secrets as JSON to $SIGYN_DOTENV_PATH"
            ;;
          mask-only)
            echo "::notice::Masked $COUNT secret values (no export)"
            ;;
          *)
            echo "::error::Unknown export mode: $SIGYN_EXPORT_MODE (use: env, dotenv, json, mask-only)"
            exit 1
            ;;
        esac

    - name: Cleanup Sensitive Files
      if: always()
      shell: bash
      run: |
        SIGYN_HOME="${SIGYN_HOME:-$HOME/.sigyn}"
        rm -rf "$SIGYN_HOME/identities" "$SIGYN_HOME/.device_key" "$SIGYN_HOME/vaults" ~/.ssh/sigyn_vault_key 2>/dev/null || true
