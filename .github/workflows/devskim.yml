# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: DevSkim

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '27 4 * * 3'

jobs:
  lint:
    name: DevSkim
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run DevSkim scanner
        uses: microsoft/DevSkim-Action@v1
        with:
          # DS440100: X25519/Ed25519 curve references are intentional crypto, not hard-coded secrets
          # DS126858: SHA1 is required by the TOTP (RFC 6238) specification
          # DS162092: localhost references are test data only
          # DS173237: hex fingerprints in tests are not real secrets/tokens
          # DS137138: sitemap XML namespace URL is a standard URI, not an API endpoint
          # DS187371: ChaCha20-Poly1305 is a modern AEAD cipher, not a weak cipher mode
          exclude-rules: "DS440100,DS126858,DS162092,DS173237,DS137138,DS187371"

      - name: Upload DevSkim scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: devskim-results.sarif
