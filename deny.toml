# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
# Run: cargo deny check

[graph]
all-features = true

[advisories]
# Ignore specific advisories by ID
ignore = [
    # proc-macro-error is unmaintained but only used transitively by tabled_derive.
    # No replacement available that tabled has adopted yet.
    "RUSTSEC-2024-0370",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "BlueOak-1.0.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
